services:
  postgres:
    container_name: nakama-postgres
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=localdb
    volumes:
      - data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  nakama:
    container_name: nakama-server
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
          /nakama/nakama migrate up --database.address postgres:localdb@nakama-postgres:5432/nakama &&
          exec /nakama/nakama --name tictactoe --database.address postgres:localdb@nakama-postgres:5432/nakama --logger.level DEBUG --socket.port 7350 --session.token_expiry_sec 86400 --runtime.http_key defaulthttpkey
    environment:
      - DB_ADDR=nakama-postgres:5432
      - DB_USER=postgres
      - DB_PASSWORD=localdb
      - DB_DATABASE=nakama
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./nakama/data/modules:/nakama/data/modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  data:
